image: electronuserland/builder:wine

stages:
  - test
  - build
  - release

variables:
  XDG_RUNTIME_DIR: /tmp/runtime-root

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

before_script:
  - mkdir -p $XDG_RUNTIME_DIR

run_tests:
  stage: test
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run test:unit
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build_job:
  stage: build
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run dist:win
    - npm run dist:linux
  artifacts:
    name: "$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - dist/hardware-info-portable.exe
      - dist/hardware-info-setup.exe
      - dist/hardware-info.AppImage
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

upload_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build_job
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
    - |
      release-cli create \
        --name "Release $CI_COMMIT_TAG" \
        --description "Automatic release for $CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --ref "$CI_COMMIT_SHA" \
        --assets-link "{\"name\":\"Windows Portable\",\"url\":\"${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/dist/hardware-info-portable.exe\"}" \
        --assets-link "{\"name\":\"Windows Installer\",\"url\":\"${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/dist/hardware-info-setup.exe\"}" \
        --assets-link "{\"name\":\"Linux AppImage\",\"url\":\"${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/dist/hardware-info.AppImage\"}"
