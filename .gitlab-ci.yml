image: electronuserland/builder:wine

stages:
  - test
  - build
  - release

variables:
  XDG_RUNTIME_DIR: /tmp/runtime-root

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

before_script:
  - mkdir -p $XDG_RUNTIME_DIR

run_tests:
  stage: test
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run test:unit
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build_job:
  stage: build
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run dist:win
    - npm run dist:linux
    # Upload to package registry
    - |
      for file in dist/hardware-info-*.{exe,AppImage}; do
        curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$file" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/hardware-info/${CI_COMMIT_TAG}/$(basename $file)"
      done
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

upload_release:
  script:
    - |
      release-cli create \
        --name "Release $CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --assets-link "{\"name\":\"Windows Portable\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/hardware-info/${CI_COMMIT_TAG}/hardware-info-portable.exe\"}" \
        --assets-link "{\"name\":\"Windows Installer\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/hardware-info/${CI_COMMIT_TAG}/hardware-info-setup.exe\"}" \
        --assets-link "{\"name\":\"Linux AppImage\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/hardware-info/${CI_COMMIT_TAG}/hardware-info.AppImage\"}"
